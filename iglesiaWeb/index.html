<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script type="module" src="/src/main.js" defer></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e2323">

    <!-- SEO: Google -->
    <meta name="description" content="ICAF - Iglesia Cristiana Amor Fraternal. Somos una iglesia trinitaria con deseo de seguir a Cristo. Reuniones domingo 10:30am y miércoles 8:30pm.">
    <meta name="keywords" content="iglesia cristiana, amor fraternal, ICAF, iglesia trinitaria, culto, comunidad cristiana">

    <!-- SEO: Open Graph (Facebook, WhatsApp, etc.) -->
    <meta property="og:title" content="ICAF - Iglesia Cristiana Amor Fraternal">
    <meta property="og:description" content="Somos una iglesia trinitaria con deseo de seguir a Cristo. Te esperamos.">
    <meta property="og:image" content="/images/iglesia1.jpg">
    <meta property="og:url" content="https://icaf.org">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="es_ES">

    <!-- SEO: Canonical -->
    <link rel="canonical" href="https://icaf.org">

    <!-- SEO: Datos estructurados (Schema.org) para iglesia -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Church",
      "name": "ICAF - Iglesia Cristiana Amor Fraternal",
      "description": "Somos una iglesia trinitaria con deseo de seguir a Cristo.",
      "url": "https://icaf.org",
      "telephone": "",
      "address": {
        "@type": "PostalAddress"
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": "Sunday",
          "opens": "10:30",
          "closes": "12:00"
        },
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": "Wednesday",
          "opens": "20:30",
          "closes": "22:00"
        }
      ]
    }
    </script>

    <title>ICAF - Iglesia Cristiana Amor Fraternal</title>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
